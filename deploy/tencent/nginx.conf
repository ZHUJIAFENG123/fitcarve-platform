server {
    listen 80;
    server_name _;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 前端静态文件根目录
    root /var/www/fitness-frontend/dist;
    index index.html;

    # 缓存静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 请求 -> 转发到 Node.js 后端
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 上传文件访问 -> 转发到后端
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
    }

    # 运动 GIF 图（直接从 public 目录提供，加速访问）
    location /exercise-gifs/ {
        alias /var/www/fitness-frontend/public/exercise-gifs/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # 资讯配图（直接从 public 目录提供）
    location /news-images/ {
        alias /var/www/fitness-frontend/public/news-images/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA 路由回退：所有非文件请求都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
